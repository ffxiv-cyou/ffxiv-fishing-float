name: "Build"
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: buildah
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          buildah bud -t code.lotlab.org/docker/xivfish-frontend:latest .
      - name: Push image
        run: |
          buildah login -u lotlab_bot -p ${{ secrets.LOTLAB_BOT }} code.lotlab.org
          buildah push code.lotlab.org/docker/xivfish-frontend:latest