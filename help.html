<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>帮助</title>

  <body>
    <div id="app">
      <h1>帮助</h1>
      <p>欢迎使用 ffxiv-fishing-float！这是一个用于《最终幻想14》的钓鱼辅助悬浮窗插件。</p>
      <h2>安装悬浮窗插件</h2>
      <p>本悬浮窗插件依赖于 <a href="https://github.com/Lotlab/ffxiv-overlay-toolkit" target="_blank">overlay-toolkit</a> 提供的获取网络数据包的功能。</p>
      <p>请确保您已经安装了此插件，并在 ACT 中启用了它。</p>
      <h2>常见问题</h2>
      <h3>提示: 悬浮窗插件连接失败</h3>
      <p>请检查 overlay-toolkit 插件是否正确安装并启用。如果问题仍然存在，请尝试重新启动 ACT。</p>
    </div>
  </body>
</html>
